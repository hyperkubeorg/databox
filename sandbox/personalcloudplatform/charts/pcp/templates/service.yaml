# service.yaml — client-facing service for the app. NodePort by default
# so the local kind cluster's host port mapping works; set type=ClusterIP
# behind an Ingress for public deployments.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pcp.fullname" . }}
  labels:
    {{- include "pcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
    {{- if .Values.gitSSH.enabled }}
    # git-over-SSH: same NodePort convention as the web port; production
    # installs expose it via a cloudferry TCP relay instead.
    - port: {{ .Values.gitSSH.port }}
      targetPort: ssh
      protocol: TCP
      name: ssh
      {{- if and (eq .Values.service.type "NodePort") .Values.gitSSH.nodePort }}
      nodePort: {{ .Values.gitSSH.nodePort }}
      {{- end }}
    {{- end }}
  selector:
    {{- include "pcp.selectorLabels" . | nindent 4 }}
