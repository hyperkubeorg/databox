{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pcp-runner.serviceAccountName" . }}
  labels:
    {{- include "pcp-runner.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# The k8s executor shells out to kubectl, which reads the mounted token.
automountServiceAccountToken: {{ .Values.serviceAccount.automount }}
{{- end }}
