{{- if not .Values.pairing.existingSecret -}}
# secret.yaml — holds the pairing setup code the init container feeds to
# `pcp-runner setup`. Keep it out of Git by pointing pairing.existingSecret
# at a Secret you created out-of-band instead.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pcp-runner.setupSecretName" . }}
  labels:
    {{- include "pcp-runner.labels" . | nindent 4 }}
type: Opaque
stringData:
  setup-code: {{ required "pairing.setupCode (the PCPBR1.… code from the admin console) is required unless pairing.existingSecret is set" .Values.pairing.setupCode | quote }}
{{- end }}
