{{/*
Auth material for the cluster (§18):
  root-password — becomes the root user's password at cluster bootstrap
                  (mounted as a file, passed via --root-password-file)
  psk           — the node pre-shared key for node-to-node authentication
                  (injected as DATABOX_PSK)

The `lookup` below is load-bearing: if the Secret already exists in the
cluster, its current values are carried forward verbatim, so `helm upgrade`
NEVER rotates credentials. Fresh installs generate random values.
(`helm template` cannot lookup and always renders fresh random values —
that is fine, template output is not applied to live clusters.)
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (include "databox.secretName" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "databox.secretName" . }}
  labels:
    {{- include "databox.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $existing }}
  # Reuse the live values — upgrades must not rotate credentials.
  root-password: {{ index $existing.data "root-password" }}
  psk: {{ index $existing.data "psk" }}
  {{- else }}
  # First install: generate fresh random credentials.
  root-password: {{ randAlphaNum 32 | b64enc }}
  psk: {{ randAlphaNum 64 | b64enc }}
  {{- end }}
